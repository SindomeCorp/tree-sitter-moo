name: Release npm package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: bindings/go/go.mod
          cache-dependency-path: bindings/go/go.mod

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip setuptools wheel tree-sitter~=0.25

      - name: Run package CI
        run: npm run ci

      - name: Verify generated parser sources are committed
        run: git diff --exit-code -- src/parser.c src/grammar.json src/node-types.json

  prebuild:
    name: Build native prebuild (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-24.04
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
          - platform: darwin-x64
            runner: macos-15-intel
          - platform: darwin-arm64
            runner: macos-14
          - platform: win32-x64
            runner: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native prebuild
        run: npm run prebuildify

      - name: Smoke test native binding
        run: npm run smoke:native

      - name: Upload native prebuild
        uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.platform }}
          path: prebuilds
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs:
      - validate
      - prebuild
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install npm with trusted publishing support
        run: npm install -g npm@^11.15.0

      - name: Install dependencies
        run: npm ci

      - name: Generate parser
        run: npm run generate

      - name: Build Wasm parser
        run: npm run build:wasm

      - name: Download native prebuilds
        uses: actions/download-artifact@v8
        with:
          pattern: prebuild-*
          merge-multiple: true
          path: prebuilds

      - name: List native prebuilds
        run: |
          find prebuilds -maxdepth 3 -type f
          test "$(find prebuilds -maxdepth 3 -type f -name 'tree-sitter-moo.node' | wc -l)" -eq 5

      - name: Smoke test package
        run: npm run smoke:package

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
