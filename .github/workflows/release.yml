name: Release npm package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run package CI
        run: npm run ci

      - name: Verify generated artifacts are committed
        run: git diff --exit-code -- src/parser.c src/grammar.json src/node-types.json dist/tree-sitter-moo.wasm

  prebuild:
    name: Build native prebuild (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-24.04
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
          - platform: darwin-x64
            runner: macos-13
          - platform: darwin-arm64
            runner: macos-14
          - platform: win32-x64
            runner: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native prebuild
        run: npm run prebuildify

      - name: Smoke test native binding
        run: npm run smoke:native

      - name: Upload native prebuild
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}
          path: prebuilds
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs:
      - validate
      - prebuild
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Generate parser
        run: npm run generate

      - name: Build Wasm parser
        run: npm run build:wasm

      - name: Download native prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          merge-multiple: true
          path: .

      - name: List native prebuilds
        run: find prebuilds -maxdepth 3 -type f

      - name: Smoke test package
        run: npm run smoke:package

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Configure temporary npm token fallback
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"

      - name: Publish to npm
        run: npm publish --access public
